<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>創作言語解読ゲーム - フィールド探索 (White Mode)</title>
    <style>
        /* --- 全体のスタイルをライトモードに変更 --- */
        body {
            background-color: #fff; 
            color: #2c3e50; 
            font-family: 'Courier New', monospace, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            /* ★これを追加：画面全体の横スクロールを完全に禁止する */
            overflow-x: hidden; 
        }
        canvas {
            background-color: #fff;    /* ゲーム画面の背景を白に */
            border: 4px solid #bdc3c7; /* 枠線を薄い色に */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            image-rendering: pixelated;
        }
        #ui-area {
            width: 480px;
            margin-top: 15px;
        }
        /* メッセージウィンドウのスタイルを白ベースに変更 */
        #messageBox {
            background-color: #fff;    /* ウィンドウ背景を白に */
            color: #000;               /* 文字を黒に */
            border: 2px solid #333;    /* 枠線を黒に */
            border-radius: 5px;
            padding: 15px;
            min-height: 80px;
            box-sizing: border-box;
            font-size: 18px;
            line-height: 1.5;
            display: none;
        }
        #instructions {
            margin-top: 10px;
            font-size: 14px;
            color: #7f8c8d;            /* 説明文の色を少し薄く */
            text-align: center;
        }

        /* --- 創作言語文字（スプライトフォント）のスタイル --- */
        .conlang-char {
            display: inline-block;
            background-image: url('conlang_font.png'); /* 作成した画像を読み込み */
            background-repeat: no-repeat;
            width: 32px;  /* 1文字の横幅(px) */
            height: 32px; /* 1文字の縦幅(px) */
            margin-right: 2px;
            vertical-align: middle; /* 地の文と高さを合わせる */
            /* 画像が透過背景に黒文字の場合、これで白背景の上に黒文字が表示されます */
        }
        #ui-area { display: flex; gap: 20px; width: 800px; } /* 横幅を広げる */
        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }
    
        #main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    
        #dictionary-panel {
            position: fixed; /* absolute から fixed に変更し、画面（ウィンドウ）を基準にする */
            right: -320px;   /* パネルの幅（280px）より少し大きめのマイナス値を指定して完全に隠す */
            top: 0;
            width: 280px;
            height: 100vh;   /* 画面の高さいっぱいにする */
            background: #fdfdfd;
            border-left: 3px solid #2c3e50;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: right 0.3s ease; 
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }
    
        /* 辞書が開いている時のクラス */
        #dictionary-panel.open {
            right: 0; /* 画面の右端にピッタリくっつける */
        }
    
        /* ★辞書を開くボタン */
        #dict-toggle {
            position: fixed;
            right: 20px;
            top: 20px;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 110;
        }
    
        #dict-toggle:hover { background: #34495e; }
    
        /* 単語帳の中身 */
        #dictList {
            margin-top: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .dict-item { 
            margin-bottom: 12px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 8px;
        }
        #dictionary-panel { 
            flex: 1; 
            background: #f8f9fa; 
            border: 2px solid #2c3e50; 
            padding: 10px; 
            max-height: 500px; 
            overflow-y: auto; 
        }
        .dict-item { 
            margin-bottom: 8px; 
            border-bottom: 1px dashed #ccc; 
            padding-bottom: 4px;
            font-size: 14px;
        }
        /* 単語（記号の塊）をクリック可能にするスタイル */
        .word-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            padding: 2px;
            vertical-align: bottom;
        }
        .word-container:hover { background-color: #dfe6e9; }
        .word-ruby {
            font-size: 10px;
            color: #e67e22;
            height: 12px;
            font-weight: bold;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .next-triangle {
            text-align: right;
            font-size: 14px;
            color: #e67e22;
            animation: blink 1s infinite;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <button id="dict-toggle" onclick="toggleDict()">📖 辞書を開く</button>

    <h2>Unknown Relics</h2>
    <canvas id="gameCanvas" width="480" height="480"></canvas>
    
    <div id="ui-area">
        <div id="messageBox"></div>
        <div id="instructions">
            [↑][↓][←][→] 移動　/　[Enter] または [Space] 調べる・閉じる
        </div>
        <div id="dictionary-panel" id="dictPanel">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;">解読辞書</h3>
                <button onclick="toggleDict()" style="cursor:pointer;">✕ 閉じる</button>
            </div>
            <div id="dictList">記録なし</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
